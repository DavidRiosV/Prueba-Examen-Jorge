{% extends 'examen/base.html' %}

{% block content %}
    <h2>¿Eliminar intervención?</h2>
    <p>¿Estás seguro de que quieres eliminar <strong>{{ obj.nombre }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'listar_intervenciones' %}">Cancelar</a>
    </form>
{% endblock %}
